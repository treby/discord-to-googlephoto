<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F6F7FA"/>
      <stop offset="1" stop-color="#E4E6EC"/>
    </linearGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="5" stdDeviation="8" flood-color="#2b2d38" flood-opacity="0.22"/>
    </filter>
    <linearGradient id="petalBlue" x1="0" y1="0" x2="0.7" y2="1">
      <stop offset="0" stop-color="#8AB4F8"/>
      <stop offset="1" stop-color="#4285F4"/>
    </linearGradient>
    <linearGradient id="petalGreen" x1="0" y1="0" x2="0.7" y2="1">
      <stop offset="0" stop-color="#81C995"/>
      <stop offset="1" stop-color="#34A853"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- transfer arrow: rises from the Discord badge, curves right at the Google Photos icon's height -->
  <path d="M 150 368 C 165 270, 245 140, 274 140" fill="none" stroke="#9298AA" stroke-width="15" stroke-linecap="round" stroke-dasharray="0.1 26"/>
  <polygon points="300,140 274,124 274,156" fill="#9298AA" filter="url(#soft)"/>

  <!-- photo card, bottom-left (uploaded from Discord) -->
  <g transform="translate(150,368) rotate(-8)" filter="url(#soft)">
    <rect x="-78" y="-62" width="156" height="124" rx="20" fill="#FFFFFF"/>
    <circle cx="-36" cy="-24" r="13" fill="#5865F2" opacity="0.85"/>
    <path d="M -64 38 L -20 -8 L 12 20 L 42 -14 L 66 38 Z" fill="#5865F2" opacity="0.85"/>

    <!-- discord badge attached to the card corner -->
    <g transform="translate(64,44) rotate(8)">
      <circle cx="0" cy="0" r="34" fill="#FFFFFF"/>
      <circle cx="0" cy="0" r="29" fill="#5865F2"/>
      <path d="M -9,-18 C -4,-10 4,-10 9,-18
               C 18,-16 22,-8 22,0
               C 22,8 18,14 12,17
               C 7,17 4,12 0,12
               C -4,12 -7,17 -12,17
               C -18,14 -22,8 -22,0
               C -22,-8 -18,-16 -9,-18 Z"
            fill="#FFFFFF"/>
      <circle cx="-7.5" cy="-3" r="3.6" fill="#5865F2"/>
      <circle cx="7.5" cy="-3" r="3.6" fill="#5865F2"/>
    </g>
  </g>

  <!-- google photos pinwheel, top-right -->
  <g transform="translate(368,140)" filter="url(#soft)">
    <circle cx="0" cy="0" r="64" fill="#FFFFFF"/>
    <path d="M 0,0 A 29,29 0 0 0 0,-58 L 0,0 Z" fill="#EA4335"/>
    <path d="M 0,0 A 29,29 0 0 0 -58,0 L 0,0 Z" fill="#FBBC04"/>
    <path d="M 0,0 A 29,29 0 0 0 0,58 L 0,0 Z" fill="url(#petalGreen)"/>
    <path d="M 0,0 A 29,29 0 0 0 58,0 L 0,0 Z" fill="url(#petalBlue)"/>
  </g>
</svg>
